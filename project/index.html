<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>My Dashboard</h2>
    <ul>
      <li>Home</li>
      <li>Analytics</li>
      <li>Settings</li>
    </ul>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <h3>Dashboard</h3>
      <input type="text" placeholder="Search...">
    </header>

    <!-- Content -->
    <section class="content">

      <div class="card">Users: 1200</div>
      <div class="card">Sales: ₹45,000</div>
      <div class="card">Growth: 12%</div>

    </section>

  </div>

</div>

</body>
</html>
